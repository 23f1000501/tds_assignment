name: Daily DevSync Update

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch: 

# ✅ ADD THIS SECTION TO FIX THE "NO COMMIT" ERROR
permissions:
  contents: write

jobs:
  automated-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # This ensures the checkout uses the token with write access
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Update for 23f1000501@ds.study.iitm.ac.in
        run: |
          # Create or update a timestamp file
          echo "Last sync: $(date)" > daily_log.txt

      - name: Commit and Push Changes
        run: |
          git config --local user.email "23f1000501@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Bot"
          git add daily_log.txt
          # The || true ensures the workflow doesn't fail if there's nothing to commit
          git commit -m "chore: automated daily update [skip ci]" || echo "No changes to commit"
          git push
